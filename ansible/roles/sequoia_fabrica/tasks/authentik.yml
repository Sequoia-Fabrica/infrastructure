---
## Authentik
# Redis was removed in authentik 2025.10 (PostgreSQL now handles caching,
# sessions, tasks and websockets). Local storage moved from /media to /data
# in 2025.12, so uploaded media now lives under /opt/authentik/data/media.
- name: "Ensure /opt/authentik/custom-templates"
  become: true
  ansible.builtin.file:
    path: "/opt/authentik/custom-templates"
    state: directory
    owner: root
    group: root
    mode: ug=rwx,o=rx
- name: "Ensure /opt/authentik/database"
  become: true
  ansible.builtin.file:
    path: "/opt/authentik/database"
    state: directory
    owner: 70
    group: 70
    mode: u=rwx,go=
- name: "Ensure /opt/authentik/data"
  become: true
  ansible.builtin.file:
    path: "/opt/authentik/data"
    state: directory
    owner: 1000
    group: 1000
    mode: ug=rwx,o=rx
- name: "Ensure /opt/authentik/data/media/public"
  become: true
  ansible.builtin.file:
    path: "/opt/authentik/data/media/public"
    state: directory
    owner: 1000
    group: 1000
    mode: ug=rwx,o=rx
- name: "Ensure /opt/authentik/certs"
  become: true
  ansible.builtin.file:
    path: "/opt/authentik/certs"
    state: directory
    owner: 1000
    group: 1000
    mode: ug=rwx,o=rx
- name: Template /opt/authentik/.env
  become: true
  ansible.builtin.template:
    src: authentik.env.j2
    dest: /opt/authentik/.env
    owner: root
    group: root
    mode: ug=rw,o=
- name: Template /opt/authentik/docker-compose.yml
  become: true
  ansible.builtin.template:
    src: authentik.docker-compose.yml.j2
    dest: /opt/authentik/docker-compose.yml
    owner: root
    group: root
    mode: ug=rw,o=
# Brand logo is referenced from the DB brand record as the bare key
# "sequoia_fabrica_tree.svg"; authentik serves it from the media "public/"
# storage prefix via signed /files URLs, so the file must live under public/.
- name: Place /opt/authentik/data/media/public/sequoia_fabrica_tree.svg
  become: true
  ansible.builtin.copy:
    src: sequoia_fabrica_tree.svg
    dest: /opt/authentik/data/media/public/sequoia_fabrica_tree.svg
    owner: 1000
    group: 1000
    mode: ug=rw,o=r
- name: Authentik docker-compose
  become: true
  community.docker.docker_compose_v2:
    project_src: /opt/authentik
    remove_orphans: true
