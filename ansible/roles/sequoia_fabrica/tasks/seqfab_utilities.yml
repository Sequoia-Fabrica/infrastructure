---
## Run sequoia-fabrica/utilities webapp
- name: Create seqfab_utilities database directory
  become: true
  ansible.builtin.file:
      path: "{{ seqfab_utilities.db_data_location_source }}"
      state: directory
      mode: u=rwx,o=rx
- name: Place Gmail service account credentials
  become: true
  ansible.builtin.copy:
      src: gmail_service_account.json
      dest: "{{ seqfab_utilities.gmail_service_account_path_source }}"
      owner: root
      group: root
      mode: u=rw,go=
- name: Place sequoia-fabrica/utilities repo deploy key
  become: true
  ansible.builtin.copy:
      src: sequoia-fabrica_utilities_deploy.key
      dest: /opt/seqfab_utilities/deploy_key
      owner: root
      group: root
      mode: u=rw,go=
- name: Clone sequoia-fabrica/utilities repo
  become: true
  ansible.builtin.git:
      accept_newhostkey: true
      key_file: /opt/seqfab_utilities/deploy_key
      repo: git@github.com:sequoia-fabrica/utilities.git
      dest: /opt/seqfab_utilities/utilities
      version: main
      update: yes
      force: yes
- name: Place /opt/seqfab_utilities/utilities/.env
  become: true
  ansible.builtin.template:
      src: seqfab_utilities.env.j2
      dest: /opt/seqfab_utilities/utilities/.env
      owner: root
      group: root
      mode: u=rw,go=
- name: Place docker-compose.override.yml for resource limits
  become: true
  ansible.builtin.copy:
      content: |
        services:
          ollama:
            deploy:
              resources:
                limits:
                  memory: {{ seqfab_utilities.ollama_memory_limit | default('2g') }}
      dest: /opt/seqfab_utilities/utilities/docker-compose.override.yml
      owner: root
      group: root
      mode: u=rw,go=r
- name: Deploy seqfab_utilities with docker-compose
  become: true
  community.docker.docker_compose_v2:
      project_src: "{{ seqfab_utilities.docker_compose_location }}"
      files:
        - compose.yml
        - docker-compose.override.yml
      remove_orphans: true
      build: always
      state: present
