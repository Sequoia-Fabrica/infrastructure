---
- name: Gather facts for architecture detection
  ansible.builtin.setup:
    gather_subset:
      - hardware

- name: Download NVIDIA Container Toolkit GPG key
  become: true
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /usr/share/keyrings/nvidia-container-toolkit-keyring.asc
    mode: '0644'

- name: Dearmor NVIDIA Container Toolkit GPG key
  become: true
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg /usr/share/keyrings/nvidia-container-toolkit-keyring.asc
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Add NVIDIA Container Toolkit repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }} /"
    state: present
    filename: nvidia-container-toolkit

- name: Install NVIDIA Container Toolkit
  become: true
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: yes

